<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 fs-4">
            <strong th:text="${user.username}">user@mail.ru</strong>
            with roles:
            <span th:each="role : ${user.roles}"
                  th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}"></span>
        </span>

        <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-link text-secondary text-decoration-none">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-2 bg-white min-vh-100 p-0">
            <div class="list-group rounded-0 mt-3">
                <a th:href="@{/user}" class="list-group-item list-group-item-action active">User</a>
                <a th:href="@{/admin}" class="list-group-item list-group-item-action">Admin</a>
            </div>
        </div>

        <div class="col-10 p-4">
            <h1 class="mb-4 fw-bold display-5">User information-page</h1>

            <div class="card">
                <div class="card-header fs-4">About user</div>
                <div class="card-body">
                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.username}"></td>
                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
