<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h2>User info</h2>

<p><b>ID:</b> <span th:text="${user.id}"></span></p>
<p><b>First Name:</b> <span th:text="${user.firstName}"></span></p>
<p><b>Last Name:</b> <span th:text="${user.lastName}"></span></p>
<p><b>Age:</b> <span th:text="${user.age}"></span></p>
<p><b>Username:</b> <span th:text="${user.username}"></span></p>
<p><b>Roles:</b>
    <span th:each="role : ${user.roles}"
          th:text="${role.name} + ' '"></span>
</p>

<a th:href="@{/admin}" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">Admin panel</a>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

</body>
</html>
