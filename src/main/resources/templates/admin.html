<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h2>Admin panel</h2>

<a th:href="@{/user}">User page</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Age</th>
        <th>Username</th>
        <th>Roles</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.firstName}"></td>
        <td th:text="${user.lastName}"></td>
        <td th:text="${user.age}"></td>
        <td th:text="${user.username}"></td>
        <td>
            <span th:each="role : ${user.roles}" th:text="${role.name} + ' '"></span>
        </td>
        <td>
            <a th:href="@{/admin/edit(id=${user.id})}">Edit</a>
        </td>
        <td>
            <form th:action="@{/admin/delete(id=${user.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<h3>Add new user</h3>

<form th:action="@{/admin}" method="post" th:object="${user}">
    <div>
        <input type="text" th:field="*{firstName}" placeholder="First Name"/>
    </div>

    <div>
        <input type="text" th:field="*{lastName}" placeholder="Last Name"/>
    </div>

    <div>
        <input type="number" th:field="*{age}" placeholder="Age"/>
    </div>

    <div>
        <input type="text" th:field="*{username}" placeholder="Username"/>
    </div>

    <div>
        <input type="password" th:field="*{password}" placeholder="Password"/>
    </div>

    <div>
        <select th:field="*{roles}" multiple>
            <option th:each="role : ${allRoles}"
                    th:value="${role.id}"
                    th:text="${role.name}">
            </option>
        </select>
    </div>

    <div>
        <button type="submit">Add user</button>
    </div>
</form>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

</body>
</html>
