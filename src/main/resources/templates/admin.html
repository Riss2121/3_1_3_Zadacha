<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">
            <strong th:text="${currentUser.username}">admin</strong>
        </span>

        <form th:action="@{/logout}" method="post">
            <button class="btn btn-link text-light">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-2 bg-white min-vh-100 p-0">
            <div class="list-group rounded-0 mt-3">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action active">Admin</a>
                <a th:href="@{/user}" class="list-group-item list-group-item-action">User</a>
            </div>
        </div>

        <div class="col-10 p-4">
            <h1 class="mb-4 fw-bold display-5">Admin panel</h1>

            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#usersTab" type="button">
                        Users table
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#newUserTab" type="button">
                        New User
                    </button>
                </li>
            </ul>

            <div class="tab-content border border-top-0 bg-white">
                <div class="tab-pane fade show active p-4" id="usersTab">
                    <h4 class="mb-4">All users</h4>

                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="userItem : ${users}">
                            <td th:text="${userItem.id}"></td>
                            <td th:text="${userItem.firstName}"></td>
                            <td th:text="${userItem.lastName}"></td>
                            <td th:text="${userItem.age}"></td>
                            <td th:text="${userItem.username}"></td>
                            <td>
                                <span th:each="role : ${userItem.roles}"
                                      th:text="${role.name} + ' '"></span>
                            </td>
                            <td>
                                <button type="button"
                                        class="btn btn-info btn-sm text-white"
                                        data-bs-toggle="modal"
                                        th:attr="data-bs-target='#editModal__' + ${userItem.id}">
                                    Edit
                                </button>
                            </td>
                            <td>
                                <button type="button"
                                        class="btn btn-danger btn-sm"
                                        data-bs-toggle="modal"
                                        th:attr="data-bs-target='#deleteModal__' + ${userItem.id}">
                                    Delete
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="tab-pane fade p-4" id="newUserTab">
                    <h4 class="mb-4">Add new user</h4>

                    <div class="row justify-content-center">
                        <div class="col-md-5">
                            <form th:action="@{/admin}" method="post" th:object="${user}" class="text-center">

                                <div class="mb-3">
                                    <label class="form-label fw-bold">First name</label>
                                    <input type="text" class="form-control" th:field="*{firstName}">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Last name</label>
                                    <input type="text" class="form-control" th:field="*{lastName}">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Age</label>
                                    <input type="number" class="form-control" th:field="*{age}">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="text" class="form-control" th:field="*{username}">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Password</label>
                                    <input type="password" class="form-control" th:field="*{password}">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Role</label>
                                    <select class="form-select" name="roles" multiple size="2">
                                        <option th:each="role : ${allRoles}"
                                                th:value="${role.id}"
                                                th:text="${role.name}">
                                        </option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-success">Add new user</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- EDIT MODALS -->
            <div th:each="userItem : ${users}">
                <div class="modal fade" th:id="'editModal__' + ${userItem.id}" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <form th:action="@{/admin/edit}" method="post">
                                <div class="modal-header">
                                    <h5 class="modal-title">Edit user</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>

                                <div class="modal-body">

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">ID</label>
                                        <input type="text" class="form-control" name="id" th:value="${userItem.id}" readonly>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">First Name</label>
                                        <input type="text" class="form-control" name="firstName" th:value="${userItem.firstName}">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Last Name</label>
                                        <input type="text" class="form-control" name="lastName" th:value="${userItem.lastName}">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Age</label>
                                        <input type="number" class="form-control" name="age" th:value="${userItem.age}">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Email</label>
                                        <input type="text" class="form-control" name="username" th:value="${userItem.username}">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Password</label>
                                        <input type="password" class="form-control" name="password" placeholder="New password">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Roles</label>
                                        <select class="form-select" name="roles" multiple size="2">
                                            <option th:each="role : ${allRoles}"
                                                    th:value="${role.id}"
                                                    th:text="${role.name}">
                                            </option>
                                        </select>
                                    </div>

                                </div>

                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    <button type="submit" class="btn btn-primary">Edit</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DELETE MODALS -->
            <div th:each="userItem : ${users}">
                <div class="modal fade" th:id="'deleteModal__' + ${userItem.id}" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <form th:action="@{/admin/delete}" method="post">
                                <div class="modal-header">
                                    <h5 class="modal-title">Delete user</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>

                                <div class="modal-body">

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">ID</label>
                                        <input type="text" class="form-control" name="id" th:value="${userItem.id}" readonly>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">First Name</label>
                                        <input type="text" class="form-control" th:value="${userItem.firstName}" disabled>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Last Name</label>
                                        <input type="text" class="form-control" th:value="${userItem.lastName}" disabled>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Age</label>
                                        <input type="number" class="form-control" th:value="${userItem.age}" disabled>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Email</label>
                                        <input type="text" class="form-control" th:value="${userItem.username}" disabled>
                                    </div>

                                </div>

                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    <button type="submit" class="btn btn-danger">Delete</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
